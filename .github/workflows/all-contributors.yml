name: "All Contributors"
on:
   issue_comment:
     types: [created] 
   workflow_dispatch:
   issues:
     tyoes: [opened]
permissions:
   contents: write
   issues: write 
   pull-requests: write
  
jobs:
  all-contributors:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository 
        uses: actions/checkout@v4
      - name: Run All Contributors
        uses: all-contributors/all-contributors-action@v0.1.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
