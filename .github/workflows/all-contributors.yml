
name: "All Contributors"
on:
   issue_comment:
     types: [created] 
   workflow_dispatch:
permissions:
   contents: write
   issues: write 
   pull-requests: write
  
jobs:
  all-contributors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run All Contributors
        uses: t4t5/all-contributors-action@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
